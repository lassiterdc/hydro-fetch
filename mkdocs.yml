site_name: "Hydro Fetch"
site_description: "Retrieve and process hydrologic datasets including MRMS radar rainfall and AORC precipitation data"
site_author: "Daniel Lassiter"
repo_url: "https://github.com/lassiterdc/hydro-fetch"

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
  palette:
    - scheme: default

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - API Reference: api.md
