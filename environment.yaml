# Conda environment for Hydro Fetch
#
# Create:   conda env create -f environment.yaml
# Activate: conda activate hydro_fetch
# Update:   conda env update -f environment.yaml
# Remove:   conda deactivate && conda env remove -n hydro_fetch
name: hydro_fetch
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - pip
  # development tools
  - ruff
  - pytest
  - coverage
  - ipdb
  # --- added by refactor-plan audit (2026-03-01) ---
  # core scientific stack
  - numpy
  - pandas
  - xarray
  - dask
  - scipy
  - flox
  # geospatial
  - geopandas
  - rioxarray
  - rasterio
  - shapely
  - cartopy
  # data formats
  - zarr
  - netcdf4
  - cfgrib
  - eccodes
  # cloud / remote access
  - fsspec
  - s3fs
  # configuration
  - pydantic>=2
  - pyyaml
  # workflow orchestration (bioconda; pinned to match snakemake-specialist workspace)
  - snakemake>=9.15
  # CLI and utilities
  - typer
  - tqdm
  - tenacity
  # visualization
  - matplotlib
  # --- end refactor-plan additions ---
  - pip:
      - -e .
      # pip-only: not available on conda channels
      - snakemake-executor-plugin-slurm
